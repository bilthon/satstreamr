<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Satstreamr — Viewer</title>
    <link rel="stylesheet" href="/src/styles/session.css" />
    <style>
      body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
      video { background: #000; border-radius: 4px; }
      .video-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
      .video-wrap { display: flex; flex-direction: column; gap: 0.25rem; }
      .video-wrap label { font-size: 0.85rem; font-weight: bold; color: #555; }
      #session-display { font-size: 0.9rem; color: #555; margin: 0.5rem 0; }
      #error { display: none; margin-top: 1rem; padding: 0.75rem 1rem; background: #fff0f0; color: #c00; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>Satstreamr — Viewer</h1>
    <p>Status: <span id="status">connecting...</span></p>
    <p><span id="dc-status">payment channel: —</span></p>
    <p id="session-display"></p>

    <!-- Remaining budget (large display) -->
    <div id="session-stats" style="display:none">
      <div>
        <span class="stat-label">Remaining budget</span>
        <span id="budget-display">—</span>
        <span id="chunk-indicator" title="Payment sent"></span>
      </div>
    </div>

    <!-- Payment paused banner -->
    <div id="payment-paused-banner">Payment paused — check your wallet</div>

    <!-- ICE restart countdown banner -->
    <div id="ice-restart-countdown" class="ice-restart-banner hidden">Reconnecting… <span id="ice-restart-seconds">15</span>s</div>

    <div id="error"></div>

    <!-- Session-end summary overlay -->
    <div id="session-summary-overlay" role="dialog" aria-modal="true" aria-labelledby="summary-title">
      <div id="session-summary-card">
        <h2 id="summary-title">Session ended</h2>
        <div class="summary-row">
          <span class="label">Duration</span>
          <span class="value" id="summary-duration">—</span>
        </div>
        <div class="summary-row">
          <span class="label">Total sats exchanged</span>
          <span class="value" id="summary-sats">—</span>
        </div>
        <div class="summary-row">
          <span class="label">Chunks paid</span>
          <span class="value" id="summary-chunks">—</span>
        </div>
        <button id="summary-close-btn" type="button">Close</button>
      </div>
    </div>

    <div class="video-row">
      <div class="video-wrap">
        <label>Tutor (remote)</label>
        <video id="remote-video" width="420" height="315" autoplay playsinline></video>
      </div>
      <div class="video-wrap">
        <label>You (local)</label>
        <video id="local-video" width="420" height="315" muted autoplay playsinline></video>
      </div>
    </div>

    <script type="module" src="/src/pages/viewer.ts"></script>
  </body>
</html>
