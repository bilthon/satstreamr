<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Satstreamr — Tutor</title>
    <link rel="stylesheet" href="/src/styles/session.css" />
    <style>
      body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
      video { background: #000; border-radius: 4px; }
      .video-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
      .video-wrap { display: flex; flex-direction: column; gap: 0.25rem; }
      .video-wrap label { font-size: 0.85rem; font-weight: bold; color: #555; }
      #session-container { margin: 1rem 0; padding: 0.75rem 1rem; background: #f0f4ff; border-radius: 4px; }
      #session-id { font-family: monospace; font-size: 1.1rem; font-weight: bold; user-select: all; }
      #error { display: none; margin-top: 1rem; padding: 0.75rem 1rem; background: #fff0f0; color: #c00; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>Satstreamr — Tutor</h1>
    <p>Status: <span id="status">connecting...</span></p>
    <p><span id="dc-status">payment channel: —</span></p>

    <div id="session-container" style="display:none">
      <p>Share this session ID with your viewer:</p>
      <p id="session-id"></p>
      <p style="font-size:0.85rem;color:#555">Or share the viewer link:
        <span id="viewer-link"></span>
      </p>
    </div>

    <!-- Session stats bar -->
    <div id="session-stats" style="display:none">
      <div>
        <span class="stat-label">Session time</span>
        <span class="stat-value" id="elapsed-time">00:00</span>
      </div>
      <div>
        <span class="stat-label">Sats received</span>
        <span class="stat-value" id="sats-received">0</span>
      </div>
    </div>

    <!-- Payment paused banner -->
    <div id="payment-paused-banner">Payment paused — waiting for viewer</div>

    <div id="error"></div>

    <!-- Session-end summary overlay -->
    <div id="session-summary-overlay" role="dialog" aria-modal="true" aria-labelledby="summary-title">
      <div id="session-summary-card">
        <h2 id="summary-title">Session ended</h2>
        <div class="summary-row">
          <span class="label">Duration</span>
          <span class="value" id="summary-duration">—</span>
        </div>
        <div class="summary-row">
          <span class="label">Total sats exchanged</span>
          <span class="value" id="summary-sats">—</span>
        </div>
        <div class="summary-row">
          <span class="label">Chunks paid</span>
          <span class="value" id="summary-chunks">—</span>
        </div>
        <div id="cashout-section">
          <h3>Cash Out</h3>
          <div id="invoice-input-row">
            <input type="text" id="invoice-input" placeholder="Paste Lightning invoice (lnbcrt&hellip;)" />
            <span id="invoice-countdown"></span>
          </div>
          <button id="pay-invoice-btn" type="button">Pay Invoice</button>
          <div id="cashout-status"></div>
        </div>
        <button id="summary-close-btn" type="button">Close</button>
      </div>
    </div>

    <div class="video-row">
      <div class="video-wrap">
        <label>You (local)</label>
        <video id="local-video" width="420" height="315" muted autoplay playsinline></video>
      </div>
      <div class="video-wrap">
        <label>Viewer (remote)</label>
        <video id="remote-video" width="420" height="315" autoplay playsinline></video>
      </div>
    </div>

    <script type="module" src="/src/pages/tutor.ts"></script>
    <script type="module">
      // Populate viewer link once session-id is set
      const observer = new MutationObserver(() => {
        const id = document.getElementById('session-id')?.textContent;
        if (id) {
          const url = new URL(window.location.href);
          url.pathname = '/viewer.html';
          url.search = '?session=' + encodeURIComponent(id);
          const linkEl = document.getElementById('viewer-link');
          if (linkEl) linkEl.textContent = url.toString();
        }
      });
      observer.observe(document.getElementById('session-id'), { childList: true, characterData: true, subtree: true });
    </script>
  </body>
</html>
